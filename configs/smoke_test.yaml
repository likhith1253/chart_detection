seed: 42
project_root: .

dataset:
  output_dir: data/raw_images
  metadata_dir: data/datasets
  labels_csv: data/datasets/labels.csv
  fingerprint_path: data/datasets/dataset_fingerprint.json
  total_images: 10
  images_per_type: 2
  chart_types:
    - bar
    - histogram
    - line
    - scatter
    - pie
  filename_prefix: synthetic
  overwrite: true

synthetic:
  font_families:
    - DejaVu Sans
    - DejaVu Serif
  font_sizes: [10, 12]
  fig_sizes:
    - [8.0, 5.0]
    - [10.0, 6.0]
  dpi_options: [100]
  palette_names:
    - Paired
    - Set2
  scatter_colormaps:
    - viridis
    - plasma
  background_colors:
    - white
    - "#f5f5f5"
  noise_levels: [0.0, 0.02]
  orientations:
    - vertical
    - horizontal
  histogram_distributions:
    - normal
    - uniform

logging:
  level: WARNING
  format: "%(asctime)s | %(levelname)s | %(name)s | %(message)s"
  file_name: null
